 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant RO&OR - Connexion</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://data2.1freewallpapers.com/detail/interior-chairs-ceiling.jpg') no-repeat center center/cover;
            color: white;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-form {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
        }

        .login-form h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        .login-form button {
            width: 100%;
            padding: 12px;
            background-color: rgb(225, 105, 6);
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-form button:hover {
            background-color: #eb6e08;
        }

        .error-message {
            color: rgb(126, 9, 9);
            text-align: center;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-form">
            <h2>Connexion Gestionnaire</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Nom d'utilisateur" required>
                <input type="password" id="password" placeholder="Mot de passe" required>
                <button type="submit">Se connecter</button>
            </form>
            <div id="error-message" class="error-message"></div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();

            // Récupérer les informations du formulaire
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Vérification des informations de connexion
            if (username === 'gestionnaire' && password === 'oui123') {
                // Si la connexion est réussie, rediriger vers la page de surveillance
                window.location.href = 'index.html';
            } else {
                // Si les informations sont incorrectes
                document.getElementById('error-message').innerText = 'Nom d\'utilisateur ou mot de passe incorrect.';
            }
        });
    </script>

</body>
</html>
